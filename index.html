<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 오늘의 선택</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #FFF8F5; color: #1a1a1a; min-height: 100vh; }
  header { background: white; border-bottom: 1px solid #F0E8E0; padding: 16px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; color: #FF6B35; }
  .live { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .container { max-width: 1040px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
  @media(max-width:750px){ .container{ grid-template-columns:1fr; } }
  .name-box { background: white; border-radius: 14px; border: 1px solid #F0E8E0; padding: 18px 20px; margin-bottom: 20px; }
  .box-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
  .name-row { display: flex; gap: 8px; align-items: center; }
  .name-input { flex: 1; padding: 10px 14px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #F0E8E0; border-radius: 10px; outline: none; background: #FFF8F5; transition: border-color 0.2s; }
  .name-input:focus { border-color: #FF6B35; }
  .name-input.error { border-color: #FF3B30; background: #FFF5F5; }
  .name-input:disabled { background: #F5F5F5; color: #888; cursor: not-allowed; }
  .confirm-btn { padding: 10px 16px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; background: #FF6B35; color: white; border: none; border-radius: 10px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .confirm-btn:hover { opacity: 0.85; }
  .name-status { margin-top: 6px; font-size: 12px; min-height: 18px; }
  .name-status.error { color: #FF3B30; }
  .name-status.success { color: #4CAF50; }
  .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media(max-width:500px){ .menu-grid{ grid-template-columns: repeat(2,1fr); } }
  .menu-card { background: white; border-radius: 14px; border: 2px solid #F0E8E0; overflow: hidden; cursor: pointer; transition: all 0.18s; position: relative; }
  .menu-card:hover { border-color: #FFB347; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.1); }
  .menu-card.selected { border-color: #FF6B35; box-shadow: 0 6px 24px rgba(255,107,53,0.2); }
  .menu-card.selected::after { content: '✓'; position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: #FF6B35; color: white; border-radius: 50%; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .menu-card-name { padding: 8px 10px 4px; font-size: 12px; font-weight: 700; text-align: center; line-height: 1.4; word-break: keep-all; }
  .menu-card.selected .menu-card-name { color: #FF6B35; }
  .vote-pill { margin: 4px 10px 8px; background: #FFF0E8; color: #FF6B35; font-size: 11px; font-weight: 700; text-align: center; padding: 3px 0; border-radius: 20px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .panel-title { font-family: 'Gmarket Sans', sans-serif; font-size: 16px; font-weight: 700; }
  .total-badge { background: #FF6B35; color: white; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .reset-btn { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; text-decoration: underline; }
  .reset-btn:hover { color: #FF6B35; }
  .vote-list { display: flex; flex-direction: column; gap: 8px; }
  .vote-item { background: white; border: 1px solid #F0E8E0; border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.2s ease; }
  .vote-item.editing { border-color: #FF6B35; background: #FFFAF8; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #FFF0E8; color: #FF6B35; font-size: 14px; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1.5px solid #FFD0B8; }
  .v-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; }
  .v-menu { font-size: 11px; color: #FF6B35; background: #FFF0E8; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .edit-name-input { flex: 1; padding: 6px 10px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #FF6B35; border-radius: 8px; outline: none; background: white; min-width: 0; }
  .edit-name-input.error { border-color: #FF3B30; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 14px; color: #ccc; transition: all 0.15s; line-height: 1; flex-shrink: 0; }
  .icon-btn:hover { color: #FF6B35; background: #FFF0E8; }
  .icon-btn.save { color: #4CAF50; }
  .icon-btn.save:hover { background: #F0FFF4; }
  .icon-btn.delete:hover { background: #FFF5F5; color: #FF3B30; }
  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2.5rem 1rem; background: white; border-radius: 14px; border: 1px solid #F0E8E0; }
</style>
</head>

  ];

  let votes = {}, confirmedName = '', isConfirmed = false, editingName = null;

  function buildGrid() {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = '';
    MENUS.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'menu-card'; card.id = 'card-' + i;
      card.onclick = () => vote(m.name);
      card.innerHTML = `<img src="${m.img}" alt="${m.name}" /><div class="menu-card-name">${m.name}</div><div class="vote-pill" id="count-${i}">0표</div>`;
      grid.appendChild(card);
    });
  }

  function getName() { return document.getElementById('name-input').value.trim(); }

  window.confirmName = function() {
    if (isConfirmed) {
      const old = confirmedName; isConfirmed = false; confirmedName = '';
      const inp = document.getElementById('name-input');
      inp.disabled = false; inp.value = old; inp.focus(); inp.select();
      const btn = document.getElementById('confirm-btn');
      btn.textContent = '확인'; btn.style.cssText = '';
      document.getElementById('name-status').textContent = '';
      document.getElementById('name-status').className = 'name-status';
      remove(ref(db, 'votes/' + old));
      return;
    }
    const name = getName();
    const statusEl = document.getElementById('name-status');
    const inp = document.getElementById('name-input');
    if (!name) { inp.classList.add('error'); statusEl.textContent = '이름을 입력해주세요'; statusEl.className = 'name-status error'; return; }
    if (votes[name] !== undefined) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; return; }
    isConfirmed = true; confirmedName = name;
    inp.disabled = true; inp.classList.remove('error');
    const btn = document.getElementById('confirm-btn');
    btn.textContent = '✏️ 수정'; btn.style.background = 'white'; btn.style.color = '#FF6B35'; btn.style.border = '1.5px solid #FF6B35';
    statusEl.textContent = confirmedName + '님, 반가워요! 🐶'; statusEl.className = 'name-status success';
    renderMenus();
  };

  function renderMenus() {
    const myVote = isConfirmed ? (votes[confirmedName] || null) : null;
    const counts = {};
    MENUS.forEach(m => counts[m.name] = 0);
    Object.values(votes).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
    MENUS.forEach((m, i) => {
      const card = document.getElementById('card-' + i);
      if (card) card.className = 'menu-card' + (myVote === m.name ? ' selected' : '');
      const c = document.getElementById('count-' + i);
      if (c) c.textContent = counts[m.name] + '표';
    });
  }

  function renderVotes() {
    const entries = Object.entries(votes);
    document.getElementById('total-badge').textContent = entries.length + '명';
    const vl = document.getElementById('vote-list');
    if (entries.length === 0) { vl.innerHTML = '<div class="empty">아직 투표한 사람이 없어요 🐾</div>'; return; }
    vl.innerHTML = '';
    entries.forEach(([n, m]) => {
      const el = document.createElement('div');
      if (editingName === n) {
        el.className = 'vote-item editing';
        el.innerHTML = `<div class="avatar">${n.charAt(0)}</div><input class="edit-name-input" id="edit-inp" value="${n}" maxlength="10" /><button class="icon-btn save" onclick="saveEdit('${n}')">✓</button><button class="icon-btn" onclick="cancelEdit()">✕</button>`;
        setTimeout(() => { const i = document.getElementById('edit-inp'); if(i){i.focus();i.select();} }, 30);
      } else {
        el.className = 'vote-item';
        el.innerHTML = `<div class="avatar">${n.charAt(0)}</div><span class="v-name">${n}</span><span class="v-menu" title="${m}">${m}</span><button class="icon-btn" onclick="startEdit('${n}')" title="이름 수정">✏️</button><button class="icon-btn delete" onclick="deleteVote('${n}')" title="삭제">✕</button>`;
      }
      vl.appendChild(el);
    });
  }

  function render() { renderMenus(); renderVotes(); }

  window.startEdit = n => { editingName = n; renderVotes(); };
  window.cancelEdit = () => { editingName = null; renderVotes(); };
  window.saveEdit = async function(oldName) {
    const inp = document.getElementById('edit-inp');
    const newName = inp ? inp.value.trim() : '';
    if (!newName) { if(inp) inp.classList.add('error'); return; }
    if (newName !== oldName && votes[newName] !== undefined) { if(inp) inp.classList.add('error'); return; }
    const oldVote = votes[oldName];
    await remove(ref(db, 'votes/' + oldName));
    if (oldVote) await set(ref(db, 'votes/' + newName), oldVote);
    if (isConfirmed && confirmedName === oldName) {
      confirmedName = newName;
      document.getElementById('name-input').value = newName;
      document.getElementById('name-status').textContent = newName + '님, 반가워요! 🐶';
    }
    editingName = null;
  };
  window.deleteVote = async function(name) {
    if (!confirm(name + '님의 투표를 삭제할까요?')) return;
    await remove(ref(db, 'votes/' + name));
    if (isConfirmed && confirmedName === name) {
      isConfirmed = false; confirmedName = '';
      const inp = document.getElementById('name-input');
      inp.disabled = false; inp.value = name;
      document.getElementById('confirm-btn').textContent = '확인';
      document.getElementById('confirm-btn').style.cssText = '';
      document.getElementById('name-status').textContent = '';
      document.getElementById('name-status').className = 'name-status';
    }
  };
  window.vote = async function(menu) {
    if (!isConfirmed) { document.getElementById('name-input').focus(); document.getElementById('name-status').textContent = '먼저 이름을 확인해주세요!'; document.getElementById('name-status').className = 'name-status error'; return; }
    const voteRef = ref(db, 'votes/' + confirmedName);
    if (votes[confirmedName] === menu) await remove(voteRef);
    else await set(voteRef, menu);
  };
  window.resetAll = async function() {
    if (!confirm('투표를 전체 초기화할까요?')) return;
    await remove(ref(db, 'votes'));
    isConfirmed = false; confirmedName = ''; editingName = null;
    const inp = document.getElementById('name-input');
    inp.disabled = false; inp.value = '';
    document.getElementById('confirm-btn').textContent = '확인'; document.getElementById('confirm-btn').style.cssText = '';
    document.getElementById('name-status').textContent = ''; document.getElementById('name-status').className = 'name-status';
  };

  onValue(ref(db, 'votes'), snap => {
    votes = snap.val() || {};
    if (!isConfirmed) {
      const name = getName(), statusEl = document.getElementById('name-status'), inp = document.getElementById('name-input');
      if (name && votes[name] !== undefined) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; }
      else if (name) { inp.classList.remove('error'); statusEl.textContent = ''; statusEl.className = 'name-status'; }
    }
    render();
  });

  document.getElementById('name-input').addEventListener('input', () => {
    const name = getName(), statusEl = document.getElementById('name-status'), inp = document.getElementById('name-input');
    if (name && votes[name] !== undefined) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; }
    else { inp.classList.remove('error'); statusEl.textContent = ''; statusEl.className = 'name-status'; }
  });
  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.confirmName(); });

  buildGrid();
</script>
</body>
</html>
