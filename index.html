<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 오늘의 선택</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #FFF8F5; color: #1a1a1a; min-height: 100vh; }

  header {
    background: white;
    border-bottom: 1px solid #F0E8E0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; color: #FF6B35; }
  .live { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
  @media(max-width:700px){ .container{ grid-template-columns:1fr; } }

  .name-box { background: white; border-radius: 14px; border: 1px solid #F0E8E0; padding: 18px 20px; margin-bottom: 20px; }
  .box-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
  .name-input { width: 100%; padding: 10px 14px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #F0E8E0; border-radius: 10px; outline: none; background: #FFF8F5; transition: border-color 0.2s; }
  .name-input:focus { border-color: #FF6B35; }

  .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  .menu-card {
    background: white;
    border-radius: 16px;
    border: 2px solid #F0E8E0;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
  }
  .menu-card:hover { border-color: #FFB347; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.1); }
  .menu-card.selected { border-color: #FF6B35; box-shadow: 0 6px 24px rgba(255,107,53,0.2); }
  .menu-card.selected::after {
    content: '✓';
    position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px;
    background: #FF6B35; color: white;
    border-radius: 50%; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .menu-card-name { padding: 10px 12px; font-size: 14px; font-weight: 500; text-align: center; }
  .menu-card .vote-pill { margin: 0 12px 10px; background: #FFF0E8; color: #FF6B35; font-size: 12px; font-weight: 700; text-align: center; padding: 4px 0; border-radius: 20px; }
  .menu-card.selected .menu-card-name { color: #FF6B35; }

  .right-panel { }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .panel-title { font-family: 'Gmarket Sans', sans-serif; font-size: 16px; font-weight: 700; }
  .total-badge { background: #FF6B35; color: white; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .reset-btn { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; text-decoration: underline; }
  .reset-btn:hover { color: #FF6B35; }

  .vote-list { display: flex; flex-direction: column; gap: 8px; }
  .vote-item { background: white; border: 1px solid #F0E8E0; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #FFF0E8; color: #FF6B35; font-size: 14px; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1.5px solid #FFD0B8; }
  .v-name { font-size: 14px; font-weight: 500; flex: 1; }
  .v-menu { font-size: 12px; color: #FF6B35; background: #FFF0E8; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2.5rem 1rem; background: white; border-radius: 14px; border: 1px solid #F0E8E0; }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChJw-PXQYtwFtbd3me4o4XJNLilOqHyic",
    authDomain: "lunch-43f33.firebaseapp.com",
    databaseURL: "https://lunch-43f33-default-rtdb.firebaseio.com",
    projectId: "lunch-43f33",
    storageBucket: "lunch-43f33.firebasestorage.app",
    messagingSenderId: "1054522593574",
    appId: "1:1054522593574:web:b992eb5a53e43d8cbc31e7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const MENUS = ['고양이1','고양이2','고양이3'];

  let votes = {};

  function getName() { return document.getElementById('name-input').value.trim(); }

  function render() {
    const name = getName();
    const myVote = votes[name] || null;
    const counts = {'고양이1':0,'고양이2':0,'고양이3':0};
    Object.values(votes).forEach(v => { if(counts[v]!==undefined) counts[v]++; });

    MENUS.forEach((m, i) => {
      const card = document.getElementById('card-'+i);
      const countEl = document.getElementById('count-'+i);
      card.className = 'menu-card' + (myVote===m?' selected':'');
      countEl.textContent = counts[m] + '표';
    });

    const entries = Object.entries(votes);
    document.getElementById('total-badge').textContent = entries.length + '명';
    const vl = document.getElementById('vote-list');
    if (entries.length === 0) {
      vl.innerHTML = '<div class="empty">아직 투표한 사람이 없어요 🐾</div>';
      return;
    }
    vl.innerHTML = '';
    entries.forEach(([n, m]) => {
      const el = document.createElement('div');
      el.className = 'vote-item';
      el.innerHTML = `<div class="avatar">${n.charAt(0)}</div><span class="v-name">${n}</span><span class="v-menu">${m}</span>`;
      vl.appendChild(el);
    });
  }

  window.vote = async function(menu) {
    const name = getName();
    if (!name) { document.getElementById('name-input').focus(); return; }
    const voteRef = ref(db, 'votes/' + name);
    if (votes[name] === menu) await remove(voteRef);
    else await set(voteRef, menu);
  };

  window.resetAll = async function() {
    if (!confirm('투표를 전체 초기화할까요?')) return;
    await remove(ref(db, 'votes'));
  };

  onValue(ref(db, 'votes'), (snap) => {
    votes = snap.val() || {};
    render();
  });

  document.getElementById('name-input').addEventListener('input', render);
</script>
