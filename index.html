<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍔 점심 주문 투표</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #FFF8F5; color: #1a1a1a; min-height: 100vh; }
  header { background: white; border-bottom: 1px solid #F0E8E0; padding: 16px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; color: #FF6B35; }
  .live { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .container { max-width: 1040px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
  @media(max-width:750px){ .container{ grid-template-columns:1fr; } }

  .left { display: flex; flex-direction: column; gap: 16px; }

  .name-box { background: white; border-radius: 14px; border: 1px solid #F0E8E0; padding: 18px 20px; }
  .box-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
  .name-row { display: flex; gap: 8px; align-items: center; }
  .name-input { flex: 1; padding: 10px 14px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #F0E8E0; border-radius: 10px; outline: none; background: #FFF8F5; transition: border-color 0.2s; }
  .name-input:focus { border-color: #FF6B35; }
  .name-input.error { border-color: #FF3B30; background: #FFF5F5; }
  .name-input:disabled { background: #F5F5F5; color: #888; cursor: not-allowed; }
  .confirm-btn { padding: 10px 16px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; background: #FF6B35; color: white; border: none; border-radius: 10px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .confirm-btn:hover { opacity: 0.85; }
  .name-status { margin-top: 6px; font-size: 12px; min-height: 18px; }
  .name-status.error { color: #FF3B30; }
  .name-status.success { color: #4CAF50; }

  .category-box { background: white; border-radius: 14px; border: 1px solid #F0E8E0; padding: 18px 20px; }
  .cat-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .cat-title .emoji { font-size: 18px; }
  .cat-items { display: flex; gap: 10px; flex-wrap: wrap; }
  .item-btn { padding: 10px 18px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #F0E8E0; border-radius: 10px; background: #FFF8F5; color: #1a1a1a; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .item-btn:hover { border-color: #FFB347; background: #FFFAF5; }
  .item-btn.selected { background: #FFF0E8; border-color: #FF6B35; color: #FF6B35; font-weight: 700; }
  .item-btn.selected::before { content: '✓ '; }

  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .panel-title { font-family: 'Gmarket Sans', sans-serif; font-size: 16px; font-weight: 700; }
  .total-badge { background: #FF6B35; color: white; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .reset-btn { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; text-decoration: underline; }
  .reset-btn:hover { color: #FF6B35; }

  .vote-list { display: flex; flex-direction: column; gap: 8px; }
  .vote-item { background: white; border: 1px solid #F0E8E0; border-radius: 12px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; animation: fadeIn 0.2s ease; }
  .vote-item.editing { border-color: #FF6B35; background: #FFFAF8; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #FFF0E8; color: #FF6B35; font-size: 14px; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1.5px solid #FFD0B8; margin-top: 1px; }
  .v-info { flex: 1; min-width: 0; }
  .v-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
  .v-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .v-tag { font-size: 11px; color: #FF6B35; background: #FFF0E8; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .v-incomplete { font-size: 11px; color: #bbb; font-style: italic; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 14px; color: #ccc; transition: all 0.15s; line-height: 1; flex-shrink: 0; }
  .icon-btn:hover { color: #FF6B35; background: #FFF0E8; }
  .icon-btn.delete:hover { background: #FFF5F5; color: #FF3B30; }
  .edit-name-input { width: 100%; padding: 6px 10px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; border: 1.5px solid #FF6B35; border-radius: 8px; outline: none; background: white; margin-bottom: 6px; }
  .edit-name-input.error { border-color: #FF3B30; }
  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2.5rem 1rem; background: white; border-radius: 14px; border: 1px solid #F0E8E0; }

  .summary-box { background: #FFF0E8; border: 1.5px solid #FFD0B8; border-radius: 12px; padding: 14px 16px; margin-top: 4px; }
  .summary-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: #FF6B35; text-transform: uppercase; margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .summary-row:last-child { margin-bottom: 0; }
  .summary-row .s-label { color: #888; }
  .summary-row .s-val { font-weight: 700; color: #1a1a1a; }
</style>
</head>
<body>
<header>
  <span style="font-size:20px">🍔</span>
  <h1>점심 주문 투표</h1>
  <div class="live"><div class="dot"></div>실시간</div>
</header>

<div class="container">
  <div class="left">
    <div class="name-box">
      <div class="box-label">내 이름</div>
      <div class="name-row">
        <input class="name-input" id="name-input" type="text" placeholder="이름을 입력하세요" maxlength="10" />
        <button class="confirm-btn" id="confirm-btn" onclick="confirmName()">확인</button>
      </div>
      <div class="name-status" id="name-status"></div>
    </div>

    <div class="category-box">
      <div class="cat-title"><span class="emoji">🍔</span> 버거</div>
      <div class="cat-items">
        <button class="item-btn" id="burger-햄버거" onclick="selectItem('burger','햄버거')">햄버거</button>
        <button class="item-btn" id="burger-치즈버거" onclick="selectItem('burger','치즈버거')">치즈버거</button>
        <button class="item-btn" id="burger-새우버거" onclick="selectItem('burger','새우버거')">새우버거</button>
      </div>
    </div>

    <div class="category-box">
      <div class="cat-title"><span class="emoji">🍟</span> 감튀</div>
      <div class="cat-items">
        <button class="item-btn" id="fries-기본" onclick="selectItem('fries','기본')">기본</button>
        <button class="item-btn" id="fries-치즈" onclick="selectItem('fries','치즈')">치즈</button>
        <button class="item-btn" id="fries-어니언" onclick="selectItem('fries','어니언')">어니언</button>
      </div>
    </div>

    <div class="category-box">
      <div class="cat-title"><span class="emoji">🥤</span> 음료</div>
      <div class="cat-items">
        <button class="item-btn" id="drink-콜라" onclick="selectItem('drink','콜라')">콜라</button>
        <button class="item-btn" id="drink-사이다" onclick="selectItem('drink','사이다')">사이다</button>
      </div>
    </div>
  </div>

  <div>
    <div class="panel-header">
      <span class="panel-title">주문 현황</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="total-badge" id="total-badge">0명</span>
        <button class="reset-btn" onclick="resetAll()">초기화</button>
      </div>
    </div>
    <div class="vote-list" id="vote-list">
      <div class="empty">아직 주문한 사람이 없어요 🍔</div>
    </div>

    <div class="summary-box" style="margin-top:16px;">
      <div class="summary-title">합계</div>
      <div id="summary-content">
        <div style="font-size:13px;color:#bbb;">주문이 들어오면 여기에 집계돼요</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChJw-PXQYtwFtbd3me4o4XJNLilOqHyic",
    authDomain: "lunch-43f33.firebaseapp.com",
    databaseURL: "https://lunch-43f33-default-rtdb.firebaseio.com",
    projectId: "lunch-43f33",
    storageBucket: "lunch-43f33.firebasestorage.app",
    messagingSenderId: "1054522593574",
    appId: "1:1054522593574:web:b992eb5a53e43d8cbc31e7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const CATS = {
    burger: { label: '버거', items: ['햄버거','치즈버거','새우버거'] },
    fries:  { label: '감튀', items: ['기본','치즈','어니언'] },
    drink:  { label: '음료', items: ['콜라','사이다'] },
  };

  let orders = {};
  let confirmedName = '', isConfirmed = false, editingName = null;
  let mySelections = { burger: null, fries: null, drink: null };

  function getName() { return document.getElementById('name-input').value.trim(); }

  window.confirmName = function() {
    if (isConfirmed) {
      const old = confirmedName;
      isConfirmed = false; confirmedName = '';
      mySelections = { burger: null, fries: null, drink: null };
      const inp = document.getElementById('name-input');
      inp.disabled = false; inp.value = old; inp.focus(); inp.select();
      const btn = document.getElementById('confirm-btn');
      btn.textContent = '확인'; btn.style.cssText = '';
      document.getElementById('name-status').textContent = '';
      document.getElementById('name-status').className = 'name-status';
      remove(ref(db, 'orders/' + old));
      renderButtons();
      return;
    }
    const name = getName();
    const statusEl = document.getElementById('name-status');
    const inp = document.getElementById('name-input');
    if (!name) { inp.classList.add('error'); statusEl.textContent = '이름을 입력해주세요'; statusEl.className = 'name-status error'; return; }
    if (orders[name]) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; return; }
    isConfirmed = true; confirmedName = name;
    inp.disabled = true; inp.classList.remove('error');
    const btn = document.getElementById('confirm-btn');
    btn.textContent = '✏️ 수정'; btn.style.background = 'white'; btn.style.color = '#FF6B35'; btn.style.border = '1.5px solid #FF6B35';
    statusEl.textContent = name + '님, 메뉴를 선택해주세요! 🍔'; statusEl.className = 'name-status success';
  };

  window.selectItem = async function(cat, item) {
    if (!isConfirmed) {
      document.getElementById('name-input').focus();
      document.getElementById('name-status').textContent = '먼저 이름을 확인해주세요!';
      document.getElementById('name-status').className = 'name-status error';
      return;
    }
    if (mySelections[cat] === item) {
      mySelections[cat] = null;
    } else {
      mySelections[cat] = item;
    }
    renderButtons();
    // save to firebase
    const hasAny = Object.values(mySelections).some(v => v !== null);
    if (hasAny) {
      await set(ref(db, 'orders/' + confirmedName), { ...mySelections });
    } else {
      await remove(ref(db, 'orders/' + confirmedName));
    }
  };

  function renderButtons() {
    Object.keys(CATS).forEach(cat => {
      CATS[cat].items.forEach(item => {
        const btn = document.getElementById(cat + '-' + item);
        if (!btn) return;
        const sel = isConfirmed && mySelections[cat] === item;
        btn.className = 'item-btn' + (sel ? ' selected' : '');
      });
    });
  }

  function renderOrders() {
    const entries = Object.entries(orders);
    document.getElementById('total-badge').textContent = entries.length + '명';
    const vl = document.getElementById('vote-list');
    if (entries.length === 0) { vl.innerHTML = '<div class="empty">아직 주문한 사람이 없어요 🍔</div>'; renderSummary([]); return; }
    vl.innerHTML = '';
    entries.forEach(([n, o]) => {
      const el = document.createElement('div');
      if (editingName === n) {
        el.className = 'vote-item editing';
        el.innerHTML = `<div class="avatar">${n.charAt(0)}</div><div class="v-info"><input class="edit-name-input" id="edit-inp" value="${n}" maxlength="10" /></div><button class="icon-btn" style="color:#4CAF50" onclick="saveEdit('${n}')">✓</button><button class="icon-btn" onclick="cancelEdit()">✕</button>`;
        setTimeout(() => { const i = document.getElementById('edit-inp'); if(i){i.focus();i.select();} }, 30);
      } else {
        const tags = Object.entries(CATS).map(([cat, info]) => {
          const val = o[cat];
          return val ? `<span class="v-tag">${info.label}: ${val}</span>` : `<span class="v-incomplete">${info.label}: 미선택</span>`;
        }).join('');
        el.className = 'vote-item';
        el.innerHTML = `<div class="avatar">${n.charAt(0)}</div><div class="v-info"><div class="v-name">${n}</div><div class="v-tags">${tags}</div></div><button class="icon-btn" onclick="startEdit('${n}')" title="수정">✏️</button><button class="icon-btn delete" onclick="deleteOrder('${n}')" title="삭제">✕</button>`;
      }
      vl.appendChild(el);
    });
    renderSummary(entries);
  }

  function renderSummary(entries) {
    const sc = document.getElementById('summary-content');
    if (entries.length === 0) { sc.innerHTML = '<div style="font-size:13px;color:#bbb;">주문이 들어오면 여기에 집계돼요</div>'; return; }
    const counts = {};
    Object.entries(CATS).forEach(([cat, info]) => {
      counts[cat] = {};
      info.items.forEach(item => counts[cat][item] = 0);
    });
    entries.forEach(([, o]) => {
      Object.keys(CATS).forEach(cat => { if (o[cat] && counts[cat][o[cat]] !== undefined) counts[cat][o[cat]]++; });
    });
    let html = '';
    Object.entries(CATS).forEach(([cat, info]) => {
      const parts = info.items.filter(item => counts[cat][item] > 0).map(item => `${item} ${counts[cat][item]}개`).join(', ');
      if (parts) html += `<div class="summary-row"><span class="s-label">${info.label}</span><span class="s-val">${parts}</span></div>`;
    });
    sc.innerHTML = html || '<div style="font-size:13px;color:#bbb;">선택된 항목이 없어요</div>';
  }

  window.startEdit = n => { editingName = n; renderOrders(); };
  window.cancelEdit = () => { editingName = null; renderOrders(); };
  window.saveEdit = async function(oldName) {
    const inp = document.getElementById('edit-inp');
    const newName = inp ? inp.value.trim() : '';
    if (!newName) { if(inp) inp.classList.add('error'); return; }
    if (newName !== oldName && orders[newName]) { if(inp) inp.classList.add('error'); return; }
    const oldOrder = orders[oldName];
    await remove(ref(db, 'orders/' + oldName));
    if (oldOrder) await set(ref(db, 'orders/' + newName), oldOrder);
    if (isConfirmed && confirmedName === oldName) {
      confirmedName = newName;
      document.getElementById('name-input').value = newName;
      document.getElementById('name-status').textContent = newName + '님, 메뉴를 선택해주세요! 🍔';
    }
    editingName = null;
  };
  window.deleteOrder = async function(name) {
    if (!confirm(name + '님의 주문을 삭제할까요?')) return;
    await remove(ref(db, 'orders/' + name));
    if (isConfirmed && confirmedName === name) {
      isConfirmed = false; confirmedName = '';
      mySelections = { burger: null, fries: null, drink: null };
      const inp = document.getElementById('name-input');
      inp.disabled = false; inp.value = name;
      document.getElementById('confirm-btn').textContent = '확인';
      document.getElementById('confirm-btn').style.cssText = '';
      document.getElementById('name-status').textContent = '';
      document.getElementById('name-status').className = 'name-status';
      renderButtons();
    }
  };
  window.resetAll = async function() {
    if (!confirm('전체 주문을 초기화할까요?')) return;
    await remove(ref(db, 'orders'));
    isConfirmed = false; confirmedName = ''; editingName = null;
    mySelections = { burger: null, fries: null, drink: null };
    const inp = document.getElementById('name-input');
    inp.disabled = false; inp.value = '';
    document.getElementById('confirm-btn').textContent = '확인';
    document.getElementById('confirm-btn').style.cssText = '';
    document.getElementById('name-status').textContent = '';
    document.getElementById('name-status').className = 'name-status';
    renderButtons();
  };

  onValue(ref(db, 'orders'), snap => {
    orders = snap.val() || {};
    // sync my selections if confirmed
    if (isConfirmed && orders[confirmedName]) {
      mySelections = { ...orders[confirmedName] };
    }
    if (!isConfirmed) {
      const name = getName(), statusEl = document.getElementById('name-status'), inp = document.getElementById('name-input');
      if (name && orders[name]) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; }
      else if (name) { inp.classList.remove('error'); statusEl.textContent = ''; statusEl.className = 'name-status'; }
    }
    renderButtons();
    renderOrders();
  });

  document.getElementById('name-input').addEventListener('input', () => {
    const name = getName(), statusEl = document.getElementById('name-status'), inp = document.getElementById('name-input');
    if (name && orders[name]) { inp.classList.add('error'); statusEl.textContent = '이미 사용 중인 이름이에요 😅'; statusEl.className = 'name-status error'; }
    else { inp.classList.remove('error'); statusEl.textContent = ''; statusEl.className = 'name-status'; }
  });
  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.confirmName(); });
</script>
</body>
</html>
